version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: mct
    main: ./cmd/mct
    binary: mct
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/JLugagne/agents-mercato/internal/mercato/inbound/commands.Version={{ .Tag }}

archives:
  - id: mct
    name_template: "mct_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
